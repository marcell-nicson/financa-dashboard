server {
    listen 80;
    server_name financas.promoestoque.com.br;

    # Redireciona HTTP → HTTPS (após instalar o Certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name financas.promoestoque.com.br;

    # Certificados Let's Encrypt (gerados pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/financas.promoestoque.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/financas.promoestoque.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Segurança básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}
